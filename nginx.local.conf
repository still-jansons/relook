# Local testing only: mount as /etc/nginx/conf.d/default.conf in Docker.
# docker run --rm -p 8080:80 \
#   -v "$PWD:/usr/share/nginx/html:ro" \
#   -v "$PWD/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro" \
#   nginx:alpine

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    location ~ ^/(.+)\.html$ {
        # $http_host keeps non-default ports (e.g. :8080) in local Docker tests; $host omits the port.
        return 301 $scheme://$http_host/$1$is_args$args;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
